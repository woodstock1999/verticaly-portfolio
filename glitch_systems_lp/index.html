<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTHUR | Future Editorial Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        .hero-img { mix-blend-mode: multiply; }
        .btn-outline { border: 1px solid #000; padding: 12px 24px; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .btn-outline:hover { background: #000; color: #fff; }
    </style>
</head>
<body class="antialiased">
    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="text-2xl font-black tracking-tighter">ARTHUR.</div>
        <div class="hidden md:flex gap-8 text-[11px] font-bold tracking-widest uppercase">
            <a href="#" class="hover:text-gray-500">Women</a>
            <a href="#" class="hover:text-gray-500">Men</a>
            <a href="#" class="hover:text-gray-500">New</a>
            <a href="#" class="hover:text-gray-500">Boutique</a>
            <a href="#" class="hover:text-gray-500">Account 0</a>
        </div>
    </nav>

    <main class="pt-32 px-8 max-w-7xl mx-auto pb-20">
        <div class="flex flex-col lg:flex-row gap-12 items-center">
            <!-- Image Area -->
            <div class="w-full lg:w-1/2 aspect-[4/5] bg-[#f8f8f8] relative overflow-hidden group">
                <img src="../thumb_fashion_nexus.png" class="w-full h-full object-cover hero-img transition duration-1000 group-hover:scale-105" alt="Campaign">
            </div>
            
            <!-- Text area -->
            <div class="w-full lg:w-1/2">
                <h1 class="text-7xl lg:text-[100px] font-black leading-[0.85] tracking-tighter mb-8 uppercase">
                    The<br>Tailored<br>Suit
                </h1>
                <p class="text-xl text-gray-700 font-light mb-10 max-w-md leading-relaxed">
                    A sculptural exploration of modern form and textile, redefining structure. Designed for the individual. Made from Italian wool.
                </p>
                <button class="btn-outline">Explore Collection</button>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-200 py-12 px-8 flex justify-between text-[11px] font-bold text-gray-400 tracking-widest uppercase">
        <div>ARTHUR. 2027</div>
        <div>Legal | Contact | Instagram</div>
    </footer>
</body>
</html>
