<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY CASH | Modern Fintech</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #f0f4fd 0%, #e8edf7 100%); color: #1e293b; overflow-x: hidden; }
        .phone-frame { border: 12px solid #fff; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05) inset; overflow: hidden; background: #fff; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col xl:flex-row items-center justify-center p-8 gap-16">
    
    <div class="max-w-xl text-center xl:text-left">
        <div class="inline-block bg-white text-emerald-500 font-bold px-4 py-1.5 rounded-full text-sm mb-6 shadow-sm ring-1 ring-gray-100">Smart Budgeting 2.0</div>
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6">Financial clarity in your pocket.</h1>
        <p class="text-xl text-slate-500 mb-10 leading-relaxed">
            Beautifully designed daily finance. Sync your accounts instantly and let our friendly budgeting algorithm do the work.
        </p>
        <div class="flex gap-4 justify-center xl:justify-start">
            <button class="bg-[#1e293b] text-white px-8 py-4 rounded-xl font-semibold shadow-xl shadow-slate-200 hover:bg-black transition transform hover:-translate-y-1 text-lg">Download App</button>
        </div>
    </div>

    <!-- App Mockup Image -->
    <div class="relative w-full max-w-sm shrink-0">
        <!-- Abstract shape behind phone -->
        <div class="absolute inset-0 bg-gradient-to-tr from-emerald-100 to-blue-100 rounded-full blur-3xl transform -translate-x-10 translate-y-10"></div>
        <div class="relative phone-frame aspect-[9/19.5]">
            <img src="../thumb_consumer_finance.png" alt="App Mockup" class="w-full h-full object-cover">
        </div>
    </div>

</body>
</html>
