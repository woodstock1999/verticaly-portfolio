<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKUMI | DEEP DIVE</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@900&family=Space+Grotesk:wght@300;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lenis Smooth Scroll -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="cursor-glow"></div>

    <header class="header">
        <div class="logo">TAKUMI.<span class="pulse"></span></div>
        <div class="menu-trigger">MENU</div>
    </header>

    <main>
        <!-- Section 1: Hero -->
        <section class="fullscreen-section hero-section">
            <div class="bg-layer" style="background-image: url('hero_deep_dive_biolum.png')"></div>
            <div class="content-layer">
                <h1 class="hero-title">
                    <div class="word">DIGITAL</div>
                    <div class="word">ALCHEMY</div>
                </h1>
                <p class="hero-sub">
                    データと感性の<br>
                    融合点。
                </p>
                <div class="scroll-indicator">
                    <span class="line"></span> SCROLL_DIVE
                </div>
            </div>
        </section>

        <!-- Section 2: Statement -->
        <section class="fullscreen-section statement-section">
            <div class="content-layer center">
                <h2 class="statement-text">
                    "We don't build websites.<br>
                    We build <span class="highlight">universes</span>."
                </h2>
                <div class="jp-statement">
                    没入せよ。<br>
                    そこは、深淵なるデジタルの海。
                </div>
            </div>
        </section>

        <!-- Section 3: Work (Slider) -->
        <section class="fullscreen-section work-section">
            <h2 class="section-label">PROJECTS</h2>
            <div class="horizontal-slider">
                <article class="project-card">
                    <div class="card-img" style="background-image: url('hero_deep_dive_biolum.png')"></div>
                    <h3 class="card-title">Project Neon</h3>
                    <p class="card-meta">Fintech / 2026</p>
                </article>
                <article class="project-card">
                    <div class="card-img" style="background-image: url('hero_deep_dive_biolum.png')"></div>
                    <h3 class="card-title">Cyber Shrine</h3>
                    <p class="card-meta">Culture / 2026</p>
                </article>
                <!-- More cards -->
            </div>
        </section>
    </main>

    <script>
        const lenis = new Lenis({ duration: 1.5, easing: (t) => 1 - Math.pow(1 - t, 4) });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Glow Cursor
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.cursor-glow');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>

</html>
